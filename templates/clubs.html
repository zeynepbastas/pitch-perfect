{% extends "base.html" %}
{% block title %}Clubs — Pitch Perfect{% endblock %}
{% block content %}

<h4 class="mb-3"><i class="bi bi-shield-fill me-2"></i>Clubs</h4>

<form method="get" class="row g-2 mb-4">
  <div class="col-md-5">
    <input type="text" name="q" class="form-control" placeholder="Search club name..." value="{{ query }}">
  </div>
  <div class="col-auto">
    <select name="league" class="form-select">
      <option value="">All Leagues</option>
      {% for l in leagues %}
      <option value="{{ l }}" {% if l == selected_league %}selected{% endif %}>{{ l }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-auto">
    <button type="submit" class="btn btn-primary">Filter</button>
  </div>
</form>

<div class="card">
  <div class="table-responsive">
    <table class="table table-hover table-striped mb-0">
      <thead>
        <tr>
          <th class="ps-3">Club</th>
          <th>League</th>
          <th>Stadium</th>
          <th class="text-center">Wins</th>
        </tr>
      </thead>
      <tbody>
        {% for row in clubs %}
        <tr>
          <td class="ps-3 fw-semibold"><a href="/clubs/{{ row[0] }}">{{ row[0] }}</a></td>
          <td class="text-muted small">{{ row[2] }}</td>
          <td class="text-muted small">{{ row[1] or '—' }}</td>
          <td class="text-center">{{ row[3] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}

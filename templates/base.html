<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pitch Perfect{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; color: #58a6ff !important; letter-spacing: 1px; }
    .nav-link { color: #8b949e !important; }
    .nav-link:hover, .nav-link.active { color: #e6edf3 !important; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #1c2128; border-bottom: 1px solid #30363d; font-weight: 600; }
    .table { color: #e6edf3; }
    .table thead th { background: #1c2128; border-color: #30363d; color: #8b949e; font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; }
    .table td, .table th { border-color: #21262d; vertical-align: middle; }
    .table-hover tbody tr:hover { background: #1c2128; }
    .table-striped tbody tr:nth-of-type(odd) { background: rgba(255,255,255,.02); }
    .badge-league { font-size: .72rem; padding: .3em .6em; border-radius: 4px; }
    .badge-pl  { background: #38003c; color: #fff; }
    .badge-ll  { background: #c8102e; color: #fff; }
    .badge-sa  { background: #024494; color: #fff; }
    .badge-bl  { background: #d20515; color: #fff; }
    .badge-l1  { background: #003899; color: #fff; }
    .stat-card { text-align: center; padding: 1.5rem; }
    .stat-number { font-size: 2.4rem; font-weight: 700; color: #58a6ff; }
    .stat-label  { color: #8b949e; font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; }
    .section-title { color: #8b949e; font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: .75rem; }
    .form-control, .form-select { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; }
    .form-control:focus, .form-select:focus { background: #0d1117; color: #e6edf3; border-color: #58a6ff; box-shadow: 0 0 0 .2rem rgba(88,166,255,.15); }
    .form-select option { background: #161b22; }
    .btn-primary { background: #1f6feb; border-color: #1f6feb; }
    .btn-outline-secondary { border-color: #30363d; color: #8b949e; }
    .btn-outline-secondary:hover { background: #21262d; color: #e6edf3; border-color: #8b949e; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { color: #79c0ff; text-decoration: underline; }
    .rank-1 { color: #ffd700; font-weight: 700; }
    .rank-2 { color: #c0c0c0; font-weight: 700; }
    .rank-3 { color: #cd7f32; font-weight: 700; }
    .gd-pos { color: #3fb950; }
    .gd-neg { color: #f85149; }
    footer { border-top: 1px solid #21262d; color: #484f58; font-size: .8rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">⚽ PITCH PERFECT</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link {% if '/leagues' in request.path %}active{% endif %}" href="/leagues">Leagues</a></li>
        <li class="nav-item"><a class="nav-link {% if '/clubs' in request.path %}active{% endif %}" href="/clubs">Clubs</a></li>
        <li class="nav-item"><a class="nav-link {% if '/players' in request.path %}active{% endif %}" href="/players">Players</a></li>
        <li class="nav-item"><a class="nav-link {% if '/managers' in request.path %}active{% endif %}" href="/managers">Managers</a></li>
        <li class="nav-item"><a class="nav-link {% if '/awards' in request.path %}active{% endif %}" href="/awards">Awards</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="py-3 mt-4">
  <div class="container text-center">Pitch Perfect &mdash; CSDS 341 Spring 2026</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

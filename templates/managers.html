{% extends "base.html" %}
{% block title %}Managers — Pitch Perfect{% endblock %}
{% block content %}

<h4 class="mb-3"><i class="bi bi-person-badge me-2"></i>Managers</h4>

<form method="get" class="row g-2 mb-4">
  <div class="col-md-5">
    <input type="text" name="q" class="form-control" placeholder="Search manager name..." value="{{ query }}">
  </div>
  <div class="col-auto">
    <button type="submit" class="btn btn-primary">Search</button>
  </div>
  {% if query %}
  <div class="col-auto">
    <a href="/managers" class="btn btn-outline-secondary">Clear</a>
  </div>
  {% endif %}
</form>

<div class="card">
  <div class="table-responsive">
    <table class="table table-hover table-striped mb-0">
      <thead>
        <tr>
          <th class="ps-3">#</th>
          <th>Manager</th>
          <th>Club</th>
          <th class="text-center">Yrs</th>
          <th class="text-center">Wins</th>
        </tr>
      </thead>
      <tbody>
        {% for row in managers %}
        <tr>
          <td class="ps-3 text-muted">{{ loop.index }}</td>
          <td class="fw-semibold">{{ row[1] }}</td>
          <td><a href="/clubs/{{ row[2] }}">{{ row[2] }}</a></td>
          <td class="text-center text-muted">{{ row[3] }}</td>
          <td class="text-center fw-bold">{{ row[4] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
